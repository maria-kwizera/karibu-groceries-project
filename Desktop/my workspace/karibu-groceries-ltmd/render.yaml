services:
  - type: web
    name: kgl-backend
    env: node
    rootDir: kgl-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://kgl-frontend.onrender.com

  - type: static
    name: kgl-frontend
    rootDir: kgl-frontend
    staticPublishPath: .
    buildCommand: ""
