<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales | KGL</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">KGL Branch</div>
      <nav class="nav">
        <a href="manager-dashboard.html" data-role-only="manager">Dashboard</a>
        <a href="agent-dashboard.html" data-role-only="agent">Dashboard</a>
        <a href="manager-dashboard.html#currentStockSection" data-role-only="manager">Current Stock</a>
        <a href="procurement.html" data-role-only="manager">Procurement</a>
        <a href="sales.html">Sales</a>
        <a href="credit-sales.html">Credit Sales</a>
        <a href="#" class="nav-logout" data-action="logout">Logout</a>
      </nav>
    </aside>
    <main class="main">
      <div id="topbarSlot"></div>
      <section class="card">
        <h3>Record Normal Sale</h3>
        <p class="small">Only in-stock produce can be sold.</p>
        <form id="salesForm" class="grid-2 form-top">
          <div class="field"><label>Name of produce</label><select id="produceName" name="produceName"></select><p id="produceNameErr" class="error"></p></div>
          <div class="field"><label>Tonnage (kg)</label><input id="tonnageKg" name="tonnageKg" /><p id="tonnageKgErr" class="error"></p></div>
          <div class="field"><label>Amount paid (UGX)</label><input id="amountPaid" name="amountPaid" /><p id="amountPaidErr" class="error"></p></div>
          <div class="field"><label>Buyer name</label><input id="buyerName" name="buyerName" /><p id="buyerNameErr" class="error"></p></div>
          <div class="field"><label>Sales agent name</label><input id="salesAgent" name="salesAgent" /><p id="salesAgentErr" class="error"></p></div>
          <div class="field"><label>Date</label><input id="saleDate" name="saleDate" type="date" /><p id="saleDateErr" class="error"></p></div>
          <div class="field"><label>Time</label><input id="saleTime" name="saleTime" type="time" /><p id="saleTimeErr" class="error"></p></div>
          <div><button type="submit" class="btn btn-primary">Save sale</button></div>
        </form>
        <p id="stockHint" class="small"></p>
        <p id="salesResult" class="success"></p>
      </section>

      <section class="card section-spaced">
        <h3>Recent Sales</h3>
        <div class="table-wrap table-top">
          <table>
            <thead><tr><th>Produce</th><th>Tonnage (kg)</th><th>Amount (UGX)</th><th>Buyer</th><th>Agent</th><th>Date</th><th>Time</th><th>Actions</th></tr></thead>
            <tbody id="salesRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="../js/pages/sales.js"></script>
</body>
</html>
